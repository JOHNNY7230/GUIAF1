name: autotesteflutter
description: "Guia Formula 1 - Estatísticas e informações em tempo real."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.2.2 
  audioplayers: ^6.1.0 
  fl_chart: ^0.68.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

